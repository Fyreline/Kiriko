# CI: every push re-proves every promise (docs/14-ENGINEERING-RULES.md §tests).
name: ci

on:
  push:
    branches: [main]
  pull_request:

env:
  CARGO_TERM_COLOR: always

jobs:
  check:
    name: fmt + clippy + tests (macOS)
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@v2
      - run: cargo fmt --all -- --check
      - run: cargo clippy --workspace --all-targets -- -D warnings
      - run: cargo test --workspace

  windows:
    name: tests (Windows — the shipping target)
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - run: cargo test --workspace

  coverage:
    name: engine-crate coverage gate
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: llvm-tools-preview
      - uses: taiki-e/install-action@cargo-llvm-cov
      - uses: Swatinem/rust-cache@v2
      # Engine crates must hold the line; the threshold may rise, never fall.
      # UI crates join the gate once egui_kittest harness tests land.
      - run: >
          cargo llvm-cov -p kiriko-core -p kiriko-project
          --fail-under-lines 75

  no-hex-outside-theme:
    name: design-token lint (no hex literals outside the theme module)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: |
          hits=$(grep -rnE 'from_rgb|from_rgba|#[0-9a-fA-F]{6}' crates --include='*.rs' \
            | grep -v 'crates/kiriko-ui/src/theme.rs' || true)
          if [ -n "$hits" ]; then
            echo "Colour values outside kiriko_ui::theme (docs/15-DESIGN.md):"
            echo "$hits"
            exit 1
          fi
